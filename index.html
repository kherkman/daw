<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web Audio DAW - Ultimate Edition</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --track-bg: #2d2d2d;
            --accent: #4caf50;
            --text: #e0e0e0;
            --wave-color: #00bcd4;
            --ruler-height: 24px;
            --control-width: 150px; 
            --mute-color: #d32f2f;
            --off-color: #555;
            --status-color: #ffeb3b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 5px;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        /* Toolbar */
        .toolbar {
            position: sticky; top: 0; background: #333; padding: 8px; z-index: 200;
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
            border-bottom: 2px solid #444; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button, .file-upload-label, .input-label {
            background: #444; border: 1px solid #666; color: white; padding: 6px 10px;
            cursor: pointer; border-radius: 4px; font-size: 0.8rem; flex-shrink: 0; user-select: none;
            display: flex; align-items: center; gap: 5px; height: 32px; box-sizing: border-box;
        }
        select.input-label { cursor: pointer; max-width: 130px; text-overflow: ellipsis; padding:0 5px;}
        button:hover { background: #555; }
        button:active { background: #666; } 
        button.primary { background: var(--accent); border-color: var(--accent); }
        button.active { background: var(--accent); border-color: #45a049; }
        
        .rec-active { background-color: #d32f2f !important; border-color: #b71c1c !important; color: white !important; animation: pulse-rec 1s infinite; }
        @keyframes pulse-rec { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        input[type="file"] { display: none; }
        
        .bpm-input {
            background: #222; border: 1px solid #555; color: var(--accent); 
            width: 45px; padding: 4px; border-radius: 3px; font-weight: bold; text-align: center;
        }

        #statusText {
            font-size: 0.8rem; font-weight: bold; color: #aaa; margin: 0 5px;
            min-width: 70px; text-align: center;
        }
        #statusText.busy { color: var(--status-color); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .time-display-container {
            background: #000; border: 1px solid #555; padding: 0 10px; height: 32px;
            border-radius: 4px; font-family: 'Courier New', monospace; font-size: 1.1rem; color: #4caf50;
            font-weight: bold; display:flex; align-items:center; justify-content:center; min-width: 90px;
        }
        
        .meter-container { display: flex; flex-direction: column; gap: 2px; align-items: center; background: #222; padding: 3px; border-radius: 4px; border: 1px solid #444; }
        .vu-meter { width: 100px; height: 10px; background: #111; display: block; border-radius: 2px; }
        .meter-label { font-size: 0.6rem; color: #aaa; line-height: 1; }

        /* Timeline */
        #timeline-container {
            margin-top: 5px; position: relative; width: 100%; height: 75vh; overflow: auto;
            background: #111; border: 1px solid #444; -webkit-overflow-scrolling: touch;
        }
        #rulerCanvas { display: block; background: #222; border-bottom: 1px solid #555; position: sticky; top: 0; z-index: 100; cursor: pointer; }
        #playhead-container { position: absolute; top: 0; bottom: 0; left: 0; width: 0; z-index: 150; pointer-events: none; }
        #playhead { position: absolute; top: 0; bottom: 0; left: 0; width: 2px; background: #ff3333; box-shadow: 0 0 4px rgba(255,0,0,0.5); }
        #playhead::after { content: ''; position: absolute; top: 0; left: -6px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 10px solid #ff3333; }

        /* Tracks */
        #tracks-area { position: relative; min-width: 100%; padding-top: 5px; background-color: var(--track-bg); }
        .track { height: 110px; border-bottom: 1px solid #000; position: relative; display: flex; align-items: center; background: transparent; }
        .track-controls {
            width: var(--control-width); height: 100%; background: #3a3a3a; padding: 5px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 4px;
            z-index: 90; position: sticky; left: 0; border-right: 2px solid #111; flex-shrink: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        .track-name { font-size: 0.65rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .track-btn { font-size: 0.7rem; padding: 4px; cursor: pointer; justify-content:center; }
        .mute-btn.active { background-color: var(--mute-color) !important; border-color: #b71c1c; }
        .remove-btn { background: #d32f2f; margin-top: auto; }

        .waveform-lane { position: relative; flex-grow: 1; height: 100%; overflow: hidden; }
        .audio-clip {
            position: absolute; height: 90px; top: 10px; background: rgba(0, 188, 212, 0.15);
            border: 1px solid var(--wave-color); border-radius: 4px; cursor: grab; overflow: hidden; touch-action: none;
        }
        .audio-clip:active { cursor: grabbing; background: rgba(0, 188, 212, 0.25); }
        .audio-clip canvas { height: 100%; width: 100%; display: block; pointer-events: none; }
        
        .trim-handle { position: absolute; top: 0; bottom: 0; width: 24px; cursor: col-resize; z-index: 10; touch-action: none; }
        .trim-handle::before { content: ''; position: absolute; top: 0; bottom: 0; width: 4px; background: rgba(255,255,255,0.4); }
        .trim-start { left: -10px; } .trim-start::before { left: 10px; }
        .trim-end { right: -10px; } .trim-end::before { right: 10px; }
        .trim-mask-left, .trim-mask-right { position: absolute; top: 0; bottom: 0; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 5; }
        .trim-mask-left { left: 0; } .trim-mask-right { right: 0; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-wrapper { background: #333; padding: 10px; border-radius: 8px; width: 95%; max-width: 800px; height: 85vh; display: flex; gap: 10px; position: relative; }
        .modal-small { max-width: 400px; height: auto; padding: 20px; flex-direction: column; }
        .modal-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
        .modal-scroll-track { width: 35px; background: #222; border-radius: 4px; display: flex; justify-content: center; padding: 5px 0; flex-shrink: 0; }
        #modalScrollSlider, #fxScrollSlider { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 100%; height: 100%; cursor: ns-resize; }

        .track-info-box { background: #222; border: 1px solid #444; padding: 8px; border-radius: 5px; font-size: 0.8rem; color: #aaa; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; flex-shrink: 0; }
        
        .settings-row { display: flex; gap: 10px; background: #222; padding: 10px; border-radius: 5px; align-items: center; flex-wrap: wrap; flex-shrink: 0; border: 1px solid #333; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 65px; }
        .control-group label { font-size: 0.7rem; color: #aaa; text-align:center; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        .control-group input[type="number"] { background: #444; border: 1px solid #666; color: white; padding: 4px; border-radius: 3px; width: 60px; text-align: center; }

        .fx-header { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; border-bottom:1px solid #444; padding-bottom:5px; }
        .fx-title { color: #fff; font-weight:bold; font-size:0.85rem; }
        .fx-toggle { background: var(--off-color); font-size: 0.65rem; border-radius: 10px; padding: 2px 8px; border:none; cursor: pointer; color:white; }
        .fx-toggle.on { background: var(--accent); }

        .eq-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; height: 150px; min-height: 150px; align-items: end; overflow-x: auto; margin-top: 5px; flex-shrink: 0; }
        .eq-band { display: flex; flex-direction: column; align-items: center; height: 100%; min-width: 20px; }
        .eq-band input[type=range] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 100%; height: 110px; margin-bottom: 5px; }
        .eq-freq { font-size: 0.5rem; color: #aaa; writing-mode: vertical-rl; transform: rotate(180deg); }
    </style>
</head>
<body>

    <div class="toolbar">
        <label class="file-upload-label">+ Raita<input type="file" id="fileInput" multiple accept="audio/*"></label>
        
        <div class="meter-container">
            <span class="meter-label">Mic</span>
            <canvas id="micMeter" class="vu-meter"></canvas>
        </div>
        <select id="micSelect" class="input-label"><option value="">Oletusmikrofoni</option></select>
        <button id="recBtn" onclick="toggleRecord()">Rec (R)</button>

        <button onclick="togglePlay()" id="playBtn">Toista (Space)</button>
        <button onclick="stop(false)">Stop</button>
        <button onclick="toBeginning()">|&lt; (W)</button>
        <div class="time-display-container" id="timeDisplay">00:00:00</div>
        
        <label class="input-label">BPM: <input type="number" id="bpmInput" class="bpm-input" value="120" min="30" max="300" onchange="updateGrid()"></label>
        <button id="snapBtn" onclick="toggleSnap()">Snap: OFF</button>
        <button id="metroBtn" onclick="toggleMetronome()">Metro (M)</button>

        <button onclick="openMasterFX()">Master FX</button>
        <button onclick="openExportModal()" class="primary">Export WAV</button>

        <button onclick="saveProject()">Save (JSON)</button>
        <label class="file-upload-label">Load<input type="file" id="loadInput" multiple accept=".json, audio/*"></label>
        
        <span id="statusText">Valmis</span>

        <div class="meter-container" style="margin-left:auto;">
            <span class="meter-label">Master L/R</span>
            <canvas id="masterMeterL" class="vu-meter"></canvas>
            <canvas id="masterMeterR" class="vu-meter" style="margin-top:1px;"></canvas>
        </div>
    </div>

    <div id="timeline-container">
        <canvas id="rulerCanvas" height="24"></canvas>
        <div id="playhead-container"><div id="playhead"></div></div>
        <div id="tracks-area" style="min-width: 2000px;"></div>
    </div>

    <!-- Dynamic Modal System -->
    <div id="eqModal" class="modal">
        <div class="modal-wrapper">
            <div class="modal-content" id="trackFxContent"></div>
            <div class="modal-scroll-track"><input type="range" id="modalScrollSlider" min="0" max="100" value="0" step="1"></div>
        </div>
    </div>

    <div id="fxModal" class="modal">
        <div class="modal-wrapper">
            <div class="modal-content" id="masterFxContent"></div>
            <div class="modal-scroll-track"><input type="range" id="fxScrollSlider" min="0" max="100" value="0" step="1"></div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="modal">
        <div class="modal-wrapper modal-small">
            <h3 style="margin:0 0 20px 0; color:white;">Vie projekti (Export)</h3>
            <div class="settings-row">
                <div class="control-group"><label>Alku (s)</label><input type="number" id="exportStart" min="0" step="0.1" value="0"></div>
                <div class="control-group"><label>Loppu (s)</label><input type="number" id="exportEnd" min="0" step="0.1" value="0"></div>
            </div>
            <div style="display:flex; justify-content:center; margin: 15px 0;"><button onclick="setFullExportRange()">Koko projekti</button></div>
            <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:auto;"><button onclick="closeExportModal()">Peruuta</button><button onclick="executeExport()" class="primary">Vie (WAV)</button></div>
        </div>
    </div>

    <script>
        const PIXELS_PER_SECOND = 50;
        const CONTROL_WIDTH = 150; 
        const EQ_FREQS = [30, 60, 100, 160, 250, 400, 630, 1000, 1600, 2500, 4000, 6300, 10000, 16000, 20000, 22000];
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        let snapEnabled = false;
        let metronomeEnabled = false;
        let isRecording = false;
        let bpm = 120;
        let nextMetroTime = 0; let currentBeat = 0;
        let mediaRecorder = null; let recordedChunks = []; let recordStartTime = 0; let micPermissionGranted = false;
        let tracks = []; let isPlaying = false; let currentPlayTime = 0; let playStartTime = 0; let playStartOffset = 0; let animationId;
        let currentEditingTrackId = null;

        const timelineContainer = document.getElementById('timeline-container');
        const rulerCanvas = document.getElementById('rulerCanvas');
        const playheadContainer = document.getElementById('playhead-container');
        const timeDisplay = document.getElementById('timeDisplay');

        // Analysers
        const masterAnalyser = audioCtx.createAnalyser(); masterAnalyser.fftSize = 1024;
        const micAnalyser = audioCtx.createAnalyser(); micAnalyser.fftSize = 1024;
        let micStreamSource = null;

        // Default FX State Generator
        const createDefaultFX = () => ({
            vol: 1.0, pan: 0.0,
            lpf: { on: false, freq: 20000, q: 1 },
            hpf: { on: false, freq: 20, q: 1 },
            eq: { on: false, values: new Array(16).fill(0) },
            chorus: { on: false, mix: 0.5, rate: 1.5, depth: 0.002 },
            flanger: { on: false, mix: 0.5, rate: 0.5, depth: 0.005, feedback: 0.5 },
            delay: { on: false, time: 0.3, feedback: 0.4, mix: 0.3 },
            reverb: { on: false, mix: 0.3, decay: 2.0 },
            limiter: { on: false, threshold: -1.0 }
        });

        let masterFX = createDefaultFX();

        // Master Graph Nodes
        let busGain, masterVolNode;
        let masterFxNodes = {};

        // Synthetic IR generator for Reverb
        function generateImpulseResponse(ctx, decay) {
            const length = ctx.sampleRate * decay;
            const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
            const left = impulse.getChannelData(0); const right = impulse.getChannelData(1);
            for (let i = 0; i < length; i++) {
                const n = length - i;
                left[i] = (Math.random() * 2 - 1) * Math.pow(n / length, 5);
                right[i] = (Math.random() * 2 - 1) * Math.pow(n / length, 5);
            }
            return impulse;
        }

        function setStatus(msg, isBusy = false) {
            const el = document.getElementById('statusText');
            el.innerText = msg;
            if (isBusy) el.classList.add('busy'); else el.classList.remove('busy');
        }

        // Complex routing builder for Track and Master (works in live and offline context)
        function buildFXChain(ctx, inputNode, outputNode, fxState, liveAnalysers = null) {
            let current = inputNode;
            let chain = {};

            // 1. LPF
            const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = fxState.lpf.freq; lpf.Q.value = fxState.lpf.q;
            if (fxState.lpf.on) { current.connect(lpf); current = lpf; }

            // 2. HPF
            const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = fxState.hpf.freq; hpf.Q.value = fxState.hpf.q;
            if (fxState.hpf.on) { current.connect(hpf); current = hpf; }

            // 3. Reverb
            const revIn = ctx.createGain(); const revDry = ctx.createGain(); const revWet = ctx.createGain();
            const convolver = ctx.createConvolver(); convolver.buffer = generateImpulseResponse(ctx, fxState.reverb.decay);
            current.connect(revIn); revIn.connect(revDry); revIn.connect(convolver); convolver.connect(revWet);
            const revOut = ctx.createGain(); revDry.connect(revOut); revWet.connect(revOut);
            if (fxState.reverb.on) { revDry.gain.value = 1 - fxState.reverb.mix; revWet.gain.value = fxState.reverb.mix; } else { revDry.gain.value = 1; revWet.gain.value = 0; }
            current = revOut;

            // 4. Chorus
            const chIn = ctx.createGain(); const chDry = ctx.createGain(); const chWet = ctx.createGain();
            const chDelay = ctx.createDelay(); chDelay.delayTime.value = 0.03;
            const chLfo = ctx.createOscillator(); chLfo.frequency.value = fxState.chorus.rate;
            const chDepth = ctx.createGain(); chDepth.gain.value = fxState.chorus.depth;
            chLfo.connect(chDepth); chDepth.connect(chDelay.delayTime); chLfo.start(0);
            current.connect(chIn); chIn.connect(chDry); chIn.connect(chDelay); chDelay.connect(chWet);
            const chOut = ctx.createGain(); chDry.connect(chOut); chWet.connect(chOut);
            if (fxState.chorus.on) { chDry.gain.value = 1 - fxState.chorus.mix; chWet.gain.value = fxState.chorus.mix; } else { chDry.gain.value = 1; chWet.gain.value = 0; }
            current = chOut;

            // 5. Flanger
            const flIn = ctx.createGain(); const flDry = ctx.createGain(); const flWet = ctx.createGain();
            const flDelay = ctx.createDelay(); flDelay.delayTime.value = 0.005;
            const flFdbk = ctx.createGain(); flFdbk.gain.value = fxState.flanger.feedback;
            const flLfo = ctx.createOscillator(); flLfo.frequency.value = fxState.flanger.rate;
            const flDepth = ctx.createGain(); flDepth.gain.value = fxState.flanger.depth;
            flLfo.connect(flDepth); flDepth.connect(flDelay.delayTime); flLfo.start(0);
            current.connect(flIn); flIn.connect(flDry); flIn.connect(flDelay); flDelay.connect(flWet); flDelay.connect(flFdbk); flFdbk.connect(flDelay);
            const flOut = ctx.createGain(); flDry.connect(flOut); flWet.connect(flOut);
            if (fxState.flanger.on) { flDry.gain.value = 1 - fxState.flanger.mix; flWet.gain.value = fxState.flanger.mix; } else { flDry.gain.value = 1; flWet.gain.value = 0; }
            current = flOut;

            // 6. Delay
            const delIn = ctx.createGain(); const delDry = ctx.createGain(); const delWet = ctx.createGain();
            const delNode = ctx.createDelay(3.0); delNode.delayTime.value = fxState.delay.time;
            const delFdbk = ctx.createGain(); delFdbk.gain.value = fxState.delay.feedback;
            current.connect(delIn); delIn.connect(delDry); delIn.connect(delNode); delNode.connect(delFdbk); delFdbk.connect(delNode); delNode.connect(delWet);
            const delOut = ctx.createGain(); delDry.connect(delOut); delWet.connect(delOut);
            if (fxState.delay.on) { delDry.gain.value = 1 - fxState.delay.mix; delWet.gain.value = fxState.delay.mix; } else { delDry.gain.value = 1; delWet.gain.value = 0; }
            current = delOut;

            // 7. EQ (16 Band)
            let eqPrev = current;
            EQ_FREQS.forEach((f, i) => {
                const filt = ctx.createBiquadFilter(); filt.type = 'peaking'; filt.frequency.value = f; filt.Q.value = 1.5;
                filt.gain.value = fxState.eq.on ? fxState.eq.values[i] : 0;
                eqPrev.connect(filt); eqPrev = filt;
            });
            current = eqPrev;

            // 8. Limiter
            const limiter = ctx.createDynamicsCompressor(); limiter.knee.value = 0; limiter.attack.value = 0.003; limiter.release.value = 0.25;
            if (fxState.limiter.on) { limiter.threshold.value = fxState.limiter.threshold; limiter.ratio.value = 20; } else { limiter.ratio.value = 1; }
            current.connect(limiter); current = limiter;

            // 9. Final Pan & Volume
            const panner = ctx.createStereoPanner(); panner.pan.value = fxState.pan;
            const outGain = ctx.createGain(); outGain.gain.value = fxState.vol;
            current.connect(panner); panner.connect(outGain);

            // Connect to analysers if live
            if (liveAnalysers) {
                outGain.connect(liveAnalysers.node);
                liveAnalysers.node.connect(outputNode);
            } else {
                outGain.connect(outputNode);
            }

            // Return references for live updating (vol, pan)
            return { outGain, panner };
        }

        function rebuildMasterGraph() {
            if (busGain) busGain.disconnect();
            busGain = audioCtx.createGain();
            masterFxNodes = buildFXChain(audioCtx, busGain, audioCtx.destination, masterFX, {node: masterAnalyser});
        }
        rebuildMasterGraph(); // Init

        // --- TRACK CLASS ---
        class Track {
            constructor(id, file, buffer, info) {
                this.id = id; this.file = file; this.buffer = buffer;
                this.bitDepth = info.depth; this.sampleRate = typeof info.rate==='number'? info.rate+" Hz" : info.rate;
                this.peakDB = calculatePeakDB(buffer);
                
                this.fx = createDefaultFX();
                this.fadeIn = 0.0; this.fadeOut = 0.0; this.isMuted = false;
                this.startTimeOffset = 0; this.trimStart = 0; this.trimEnd = buffer.duration;
                
                this.liveNodes = null; 
                this.analyser = audioCtx.createAnalyser(); this.analyser.fftSize = 1024;
                this.source = null;
                
                this.createUI();
            }
            createUI() {
                const div = document.createElement('div'); div.className = 'track'; div.id = `track-${this.id}`;
                div.innerHTML = `
                    <div class="track-controls">
                        <div class="track-name">${this.file.name}</div>
                        <div class="meter-container"><canvas id="meter-${this.id}" class="vu-meter"></canvas></div>
                        <button onclick="openEQ('${this.id}')" class="track-btn">FX / Mix</button>
                        <button id="mute-${this.id}" class="track-btn mute-btn">Mute</button>
                        <button onclick="removeTrack('${this.id}')" class="track-btn remove-btn">Poista</button>
                    </div>`;
                const lane = document.createElement('div'); lane.className = 'waveform-lane';
                const clip = document.createElement('div'); clip.className = 'audio-clip'; clip.id = `clip-${this.id}`;
                clip.style.width = (this.buffer.duration * PIXELS_PER_SECOND) + 'px';
                const canvas = document.createElement('canvas'); canvas.width = Math.min(this.buffer.duration * PIXELS_PER_SECOND, 30000); canvas.height = 90;
                this.drawWaveform(canvas);
                const trimL = document.createElement('div'); trimL.className = 'trim-handle trim-start';
                const trimR = document.createElement('div'); trimR.className = 'trim-handle trim-end';
                const maskL = document.createElement('div'); maskL.className = 'trim-mask-left'; maskL.style.width = '0px';
                const maskR = document.createElement('div'); maskR.className = 'trim-mask-right'; maskR.style.width = '0px';
                clip.append(canvas, maskL, maskR, trimL, trimR); lane.appendChild(clip); div.appendChild(lane);
                document.getElementById('tracks-area').appendChild(div);
                this.muteBtn = document.getElementById(`mute-${this.id}`);
                this.muteBtn.onclick = () => this.toggleMute();
                this.setupDrag(clip); this.setupTrim(trimL, 'start', clip, maskL); this.setupTrim(trimR, 'end', clip, maskR);
                refreshTimeline();
            }
            toggleMute() {
                this.isMuted = !this.isMuted;
                this.muteBtn.className = 'track-btn mute-btn ' + (this.isMuted ? 'active' : '');
                if(this.liveNodes) this.liveNodes.outGain.gain.setValueAtTime(this.isMuted ? 0 : this.fx.vol, audioCtx.currentTime);
            }
            drawWaveform(canvas) {

        }

        function openEQ(id) {
            currentEditingTrackId = id; const t = tracks.find(x => x.id === id); if(!t) return;
            buildFXUI('trackFxContent', t.fx, 'Track: ' + t.file.name, () => {
                if (t.liveNodes && !t.isMuted) {
                    t.liveNodes.outGain.gain.setValueAtTime(t.fx.vol, audioCtx.currentTime);
                    t.liveNodes.panner.pan.setValueAtTime(t.fx.pan, audioCtx.currentTime);
                }
            });
            document.getElementById('eqModal').classList.add('active');
        }

        // --- JSON SAVE & LOAD ---
        function saveProject() {
            const proj = {
                bpm, masterFX,
                tracks: tracks.map(t => ({
                    fileName: t.file.name, fx: t.fx, fadeIn: t.fadeIn, fadeOut: t.fadeOut, isMuted: t.isMuted,
                    startTimeOffset: t.startTimeOffset, trimStart: t.trimStart, trimEnd: t.trimEnd
                }))
            };
            const blob = new Blob([JSON.stringify(proj, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'projekti.json'; a.click();
        }

        document.getElementById('loadInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files); if (!files.length) return;
            const jsonFile = files.find(f => f.name.endsWith('.json'));
            if (!jsonFile) return alert("Valitse tallennettu .json projektitiedosto.");
            
            try {
                const text = await jsonFile.text(); const proj = JSON.parse(text);
                
                // Clear current
                stop(); tracks.forEach(t => document.getElementById(`track-${t.id}`)?.remove()); tracks = [];
                
                bpm = proj.bpm || 120; document.getElementById('bpmInput').value = bpm; updateGrid();
                if(proj.masterFX) masterFX = proj.masterFX; rebuildMasterGraph();

                let missing = [];
                for (let tData of proj.tracks) {
                    const audioFile = files.find(f => f.name === tData.fileName);
                    if (!audioFile) { missing.push(tData.fileName); continue; }
                    
                    const info = await scanWavHeader(audioFile);
                    const ab = await audioFile.arrayBuffer();
                    const buff = await audioCtx.decodeAudioData(ab);
                    
                    const t = new Track('t_'+Date.now()+Math.random(), audioFile, buff, info);
                    t.fx = tData.fx; t.fadeIn = tData.fadeIn; t.fadeOut = tData.fadeOut; t.isMuted = tData.isMuted;
                    t.startTimeOffset = tData.startTimeOffset; t.trimStart = tData.trimStart; t.trimEnd = tData.trimEnd;
                    
                    // Update UI placements
                    const el = document.getElementById(`clip-${t.id}`);
                    el.style.left = (t.startTimeOffset * PIXELS_PER_SECOND) + 'px';
                    const maskL = el.querySelector('.trim-mask-left'); const maskR = el.querySelector('.trim-mask-right');
                    maskL.style.width = (t.trimStart * PIXELS_PER_SECOND) + 'px';
                    maskR.style.width = ((t.buffer.duration - t.trimEnd) * PIXELS_PER_SECOND) + 'px';
                    
                    tracks.push(t);
                }
                
                if (missing.length) alert("Huomio selainrajoituksista!\nSeuraavia äänitiedostoja ei voitu ladata, koska niitä ei valittu latausikkunassa JSONin lisäksi:\n\n" + missing.join("\n"));
                refreshTimeline(); setStatus("Projekti ladattu"); e.target.value = '';
            } catch(err) { alert("Virhe ladattaessa: " + err.message); }
        });

        // --- FILE IMPORT (Audio Only) ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            const files = Array.from(e.target.files).filter(f => !f.name.endsWith('.json'));
            if(files.length > 0) {
                setStatus("Ladataan...", true);
                setTimeout(async () => {
                    for (let file of files) {
                        try {
                            const info = await scanWavHeader(file); const ab = await file.arrayBuffer(); const buff = await audioCtx.decodeAudioData(ab);
                            tracks.push(new Track('t_'+Date.now()+Math.random(), file, buff, info));
                        } catch(err) {}
                    }
                    e.target.value = ''; setStatus("Valmis");
                }, 50);
            }
        });

        // --- EXPORT ---
        function openExportModal() {
            if (!tracks.length) return alert("Ei raitoja.");
            document.getElementById('exportStart').value = 0; document.getElementById('exportEnd').value = getProjectDuration().toFixed(2);
            document.getElementById('exportModal').classList.add('active');
        }
        function closeExportModal() { document.getElementById('exportModal').classList.remove('active'); }
        function setFullExportRange() { document.getElementById('exportStart').value = 0; document.getElementById('exportEnd').value = getProjectDuration().toFixed(2); }
        
        async function executeExport() {
            const start = parseFloat(document.getElementById('exportStart').value); const end = parseFloat(document.getElementById('exportEnd').value);
            if (end <= start) return alert("Virheellinen pituus."); closeExportModal(); setStatus("Renderöidään...", true);
            
            setTimeout(async () => {
                const dur = end - start; const offCtx = new OfflineAudioContext(2, dur * 44100, 44100);
                const bus = offCtx.createGain();
                buildFXChain(offCtx, bus, offCtx.destination, masterFX, null);

                tracks.forEach(t => {
                    const aStart = t.startTimeOffset + t.trimStart; const aEnd = t.startTimeOffset + t.trimEnd;
                    const rStart = aStart - start;
                    if (rStart >= 0 && rStart < dur) { const pDur = Math.min(aEnd - aStart, dur - rStart); t.play(offCtx, bus, rStart, t.trimStart, pDur); } 
                    else if (rStart < 0 && (aEnd - start) > 0) { const offShift = Math.abs(rStart); const pDur = Math.min((aEnd - start), dur); t.play(offCtx, bus, 0, t.trimStart + offShift, pDur); }
                });
                const buf = await offCtx.startRendering(); const wav = bufferToWave(buf, buf.length);
                const a = document.createElement('a'); a.href = URL.createObjectURL(wav); a.download = 'mix.wav'; a.click(); setStatus("Valmis");
            }, 50);
        }

        function bufferToWave(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer), channels = [], i, offset = 0, pos = 0;
            const setU16=d=>{view.setUint16(pos,d,true);pos+=2;}; const setU32=d=>{view.setUint32(pos,d,true);pos+=4;};
            setU32(0x46464952); setU32(length-8); setU32(0x45564157); setU32(0x20746d66); setU32(16); setU16(1); setU16(numOfChan); setU32(abuffer.sampleRate); setU32(abuffer.sampleRate*2*numOfChan); setU16(numOfChan*2); setU16(16); setU32(0x61746164); setU32(length-pos-4);
            for(i=0; i<numOfChan; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) { for(i=0; i<numOfChan; i++) { let s = Math.max(-1, Math.min(1, channels[i][offset] || 0)); s = (s<0?s*32768:s*32767)|0; view.setInt16(pos, s, true); pos+=2; } offset++; }
            return new Blob([buffer], {type: "audio/wav"});
        }
    </script>
