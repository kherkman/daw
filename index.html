<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web Audio DAW - Grid & Snap</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --track-bg: #2d2d2d;
            --accent: #4caf50;
            --text: #e0e0e0;
            --wave-color: #00bcd4;
            --ruler-height: 24px;
            --control-width: 120px; 
            --mute-color: #d32f2f;
            --off-color: #555;
            --status-color: #ffeb3b;
            --grid-line-color: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 5px;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        /* Toolbar */
        .toolbar {
            position: sticky; top: 0; background: #333; padding: 8px; z-index: 200;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            border-bottom: 2px solid #444; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button, .file-upload-label, .input-label {
            background: #444; border: 1px solid #666; color: white; padding: 6px 12px;
            cursor: pointer; border-radius: 4px; font-size: 0.85rem; flex-shrink: 0; user-select: none;
            display: flex; align-items: center; gap: 5px;
        }
        button:active { background: #666; } 
        button.primary { background: var(--accent); border-color: var(--accent); }
        button.active { background: var(--accent); border-color: #45a049; }
        input[type="file"] { display: none; }
        
        /* BPM Input Style */
        .bpm-input {
            background: #222; border: 1px solid #555; color: var(--accent); 
            width: 50px; padding: 4px; border-radius: 3px; font-weight: bold; text-align: center;
        }

        /* Status Text */
        #statusText {
            font-size: 0.85rem; font-weight: bold; color: #aaa; margin-left: 10px; margin-right: 10px;
            min-width: 80px; text-align: center;
        }
        #statusText.busy { color: var(--status-color); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Time & Meter */
        .time-display-container {
            background: #000; border: 1px solid #555; padding: 5px 10px;
            border-radius: 4px; font-family: 'Courier New', monospace; font-size: 1.1rem; color: #4caf50;
            font-weight: bold; margin: 0 10px; min-width: 100px; text-align: center;
        }
        .meter-container {
            display: flex; align-items: center; gap: 5px; background: black;
            padding: 5px 10px; border-radius: 4px; margin-left: auto;
        }
        .lufs-value { font-family: monospace; color: #0f0; min-width: 50px; text-align: right; }
        
        /* Timeline */
        #timeline-container {
            margin-top: 5px; position: relative; width: 100%; height: 70vh; overflow: auto;
            background: #111; border: 1px solid #444; -webkit-overflow-scrolling: touch;
        }
        #rulerCanvas {
            display: block; background: #222; border-bottom: 1px solid #555;
            position: sticky; top: 0; z-index: 100; cursor: pointer;
        }
        
        #playhead-container { position: absolute; top: 0; bottom: 0; left: 0; width: 0; z-index: 150; pointer-events: none; }
        #playhead { position: absolute; top: 0; bottom: 0; left: 0; width: 2px; background: #ff3333; box-shadow: 0 0 4px rgba(255,0,0,0.5); }
        #playhead::after { content: ''; position: absolute; top: 0; left: -6px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 10px solid #ff3333; }

        /* Tracks */
        #tracks-area { 
            position: relative; min-width: 100%; padding-top: 5px; 
            background-color: var(--track-bg); /* Base color */
            /* Grid lines will be added here via JS */
        }
        
        .track { 
            height: 110px; 
            border-bottom: 1px solid #000; 
            position: relative; 
            display: flex; 
            align-items: center;
            background: transparent; /* Transparent so grid on parent shows through */
        }
        .track-controls {
            width: var(--control-width); height: 100%; background: #3a3a3a; padding: 5px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 4px;
            z-index: 90; position: sticky; left: 0; border-right: 2px solid #111;
            flex-shrink: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        .track-name { font-size: 0.65rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .track-btn { font-size: 0.7rem; padding: 4px; cursor: pointer; }
        .mute-btn.active { background-color: var(--mute-color) !important; border-color: #b71c1c; }
        .remove-btn { background: #d32f2f; margin-top: auto; }

        .waveform-lane { position: relative; flex-grow: 1; height: 100%; overflow: hidden; }
        .audio-clip {
            position: absolute; height: 90px; top: 10px; background: rgba(0, 188, 212, 0.15);
            border: 1px solid var(--wave-color); border-radius: 4px; cursor: grab; overflow: hidden; touch-action: none;
        }
        .audio-clip:active { cursor: grabbing; background: rgba(0, 188, 212, 0.25); }
        .audio-clip canvas { height: 100%; width: 100%; display: block; pointer-events: none; }
        
        .trim-handle { position: absolute; top: 0; bottom: 0; width: 24px; cursor: col-resize; z-index: 10; touch-action: none; }
        .trim-handle::before { content: ''; position: absolute; top: 0; bottom: 0; width: 4px; background: rgba(255,255,255,0.4); }
        .trim-start { left: -10px; } .trim-start::before { left: 10px; }
        .trim-end { right: -10px; } .trim-end::before { right: 10px; }
        .trim-mask-left, .trim-mask-right { position: absolute; top: 0; bottom: 0; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 5; }
        .trim-mask-left { left: 0; } .trim-mask-right { right: 0; }

        /* Modal & UI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-wrapper {
            background: #333; padding: 10px; border-radius: 8px; width: 95%; max-width: 750px; height: 85vh; 
            display: flex; gap: 10px; position: relative;
        }
        .modal-small { max-width: 400px; height: auto; padding: 20px; flex-direction: column; }

        .modal-content {
            flex-grow: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; 
        }
        .modal-scroll-track { width: 35px; background: #222; border-radius: 4px; display: flex; justify-content: center; padding: 5px 0; flex-shrink: 0; }
        
        #modalScrollSlider, #fxScrollSlider { 
            writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 100%; height: 100%; cursor: ns-resize; 
        }

        .track-info-box { background: #222; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 0.85rem; color: #aaa; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; flex-shrink: 0; }
        .info-label { color: #888; font-size: 0.75rem; }
        .info-val { color: #fff; font-weight: bold; }

        .settings-row { display: flex; gap: 15px; background: #222; padding: 12px; border-radius: 5px; justify-content: space-around; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 70px; }
        .control-group label { font-size: 0.75rem; color: #aaa; }
        .control-group input { width: 100%; cursor: pointer; }
        .control-group input[type="number"] { background: #444; border: 1px solid #666; color: white; padding: 5px; border-radius: 3px; width: 80px; text-align: center; }

        .fx-header { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; border-bottom:1px solid #444; padding-bottom:5px; }
        .fx-title { color: #fff; font-weight:bold; font-size:0.9rem; }
        .fx-toggle { background: var(--off-color); font-size: 0.7rem; border-radius: 10px; padding: 2px 8px; border:none; cursor: pointer; }
        .fx-toggle.on { background: var(--accent); }

        .eq-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; height: 200px; min-height: 200px; align-items: end; overflow-x: auto; margin-top: 10px; flex-shrink: 0; }
        .eq-band { display: flex; flex-direction: column; align-items: center; height: 100%; min-width: 22px; }
        .eq-band input[type=range] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 100%; height: 160px; margin-bottom: 5px; }
        .eq-freq { font-size: 0.55rem; color: #aaa; writing-mode: vertical-rl; transform: rotate(180deg); }

    </style>
</head>
<body>

    <div class="toolbar">
        <label class="file-upload-label">
            + 
            <input type="file" id="fileInput" multiple accept="audio/wav, audio/mp3, audio/mpeg">
        </label>
        <button onclick="togglePlay()" id="playBtn">Toista</button>
        <button onclick="stop(false)">Stop</button>
        <button onclick="toBeginning()">|&lt;</button>
        <div class="time-display-container" id="timeDisplay">00:00:00</div>
        
        <div class="input-label">
            BPM: <input type="number" id="bpmInput" class="bpm-input" value="120" min="30" max="300" onchange="updateGrid()">
        </div>
        <button id="snapBtn" onclick="toggleSnap()">Snap: OFF</button>

        <button onclick="openMasterFX()">FX</button>
        <button onclick="openExportModal()" class="primary">Export</button>
        
        <span id="statusText">Valmis</span>

        <div class="meter-container">
            <span style="font-size: 0.8rem;">dB:</span>
            <span id="lufsDisplay" class="lufs-value">-inf</span>
        </div>
    </div>

    <div id="timeline-container">
        <canvas id="rulerCanvas" height="24"></canvas>
        <div id="playhead-container"><div id="playhead"></div></div>
        <div id="tracks-area" style="min-width: 2000px;"></div>
    </div>

    <!-- Track Settings Modal -->
    <div id="eqModal" class="modal">
        <div class="modal-wrapper">
            <div class="modal-content" id="modalContentArea">
                <h3 id="eqTitle" style="margin:0; color:white; flex-shrink:0;">Track Settings</h3>
                <div class="track-info-box" id="trackInfoBox"></div>
                <div class="settings-row">
                    <div class="control-group"><label>Volume: <span id="volVal">100%</span></label><input type="range" id="volSlider" min="0" max="2" step="0.01" value="1"></div>
                    <div class="control-group"><label>Pan: <span id="panVal">C</span></label><input type="range" id="panSlider" min="-1" max="1" step="0.05" value="0"></div>
                </div>
                <div class="settings-row">
                    <div class="control-group"><label>Fade In: <span id="fadeInVal">0.0s</span></label><input type="range" id="fadeInSlider" min="0" max="5" step="0.1" value="0"></div>
                    <div class="control-group"><label>Fade Out: <span id="fadeOutVal">0.0s</span></label><input type="range" id="fadeOutSlider" min="0" max="5" step="0.1" value="0"></div>
                </div>
                <div class="settings-row">
                    <div class="fx-header"><span class="fx-title">Track Delay</span><button id="trackDelayToggle" class="fx-toggle">OFF</button></div>
                    <div class="control-group"><label>Time: <span id="trackDelayTimeVal">0.30s</span></label><input type="range" id="trackDelayTimeSlider" min="0" max="1.0" step="0.01"></div>
                    <div class="control-group"><label>Fdbk: <span id="trackDelayFdbkVal">40%</span></label><input type="range" id="trackDelayFdbkSlider" min="0" max="0.95" step="0.05"></div>
                    <div class="control-group"><label>Mix: <span id="trackDelayMixVal">30%</span></label><input type="range" id="trackDelayMixSlider" min="0" max="1" step="0.05"></div>
                </div>
                <div style="font-size:0.8rem; color:#aaa; margin-top:10px; flex-shrink:0;">EQ (16-Band)</div>
                <div class="eq-grid" id="eqSliders"></div>
                <div class="settings-row">
                    <div class="fx-header"><span class="fx-title">Track Limiter</span><button id="trackLimiterToggle" class="fx-toggle">OFF</button></div>
                    <div class="control-group" style="width:100%"><label>Threshold: <span id="trackLimiterThreshVal">-1.0 dB</span></label><input type="range" id="trackLimiterThreshSlider" min="-20" max="0" step="0.1"></div>
                </div>
                <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:10px; margin-bottom:20px; flex-shrink:0;">
                    <button onclick="resetSettings()">Nollaa</button>
                    <button onclick="closeEQ()" class="primary">Sulje</button>
                </div>
            </div>
            <div class="modal-scroll-track"><input type="range" id="modalScrollSlider" min="0" max="100" value="0" step="1"></div>
        </div>
    </div>

    <!-- Master FX Modal -->
    <div id="fxModal" class="modal">
        <div class="modal-wrapper">
            <div class="modal-content" id="fxContentArea">
                <h3 style="margin:0; color:white; flex-shrink:0;">Master FX</h3>
                <div class="settings-row">
                    <div class="fx-header"><span class="fx-title">1. Master Volume</span></div>
                    <div class="control-group" style="width:100%"><label>Volume: <span id="masterVolVal">100%</span></label><input type="range" id="masterVolSlider" min="0" max="2" step="0.01"></div>
                </div>
                <div class="settings-row">
                    <div class="fx-header"><span class="fx-title">2. Delay</span><button id="delayToggle" class="fx-toggle" onclick="toggleMasterFX('delay')">OFF</button></div>
                    <div class="control-group"><label>Time: <span id="delayTimeVal">0.30s</span></label><input type="range" id="delayTimeSlider" min="0" max="1.0" step="0.01"></div>
                    <div class="control-group"><label>Fdbk: <span id="delayFdbkVal">40%</span></label><input type="range" id="delayFdbkSlider" min="0" max="0.95" step="0.05"></div>
                    <div class="control-group"><label>Mix: <span id="delayMixVal">30%</span></label><input type="range" id="delayMixSlider" min="0" max="1" step="0.05"></div>
                </div>
                <div class="settings-row" style="display:block;">
                    <div class="fx-header"><span class="fx-title">3. Master EQ</span><button id="masterEqToggle" class="fx-toggle" onclick="toggleMasterFX('eq')">OFF</button></div>
                    <div class="eq-grid" id="masterEqSliders"></div>
                </div>
                <div class="settings-row">
                    <div class="fx-header"><span class="fx-title">4. Limiter</span><button id="limiterToggle" class="fx-toggle" onclick="toggleMasterFX('limiter')">OFF</button></div>
                    <div class="control-group" style="width:100%"><label>Threshold: <span id="limiterThreshVal">-1.0 dB</span></label><input type="range" id="limiterThreshSlider" min="-20" max="0" step="0.1"></div>
                </div>
                <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:10px; margin-bottom:20px; flex-shrink:0;">
                    <button onclick="closeMasterFX()" class="primary">Sulje</button>
                </div>
            </div>
            <div class="modal-scroll-track"><input type="range" id="fxScrollSlider" min="0" max="100" value="0" step="1"></div>
        </div>
    </div>

    <!-- Export Selection Modal -->
    <div id="exportModal" class="modal">
        <div class="modal-wrapper modal-small">
            <h3 style="margin:0 0 20px 0; color:white;">Vie projekti (Export)</h3>
            <div class="settings-row">
                <div class="control-group"><label>Alku (s)</label><input type="number" id="exportStart" min="0" step="0.1" value="0"></div>
                <div class="control-group"><label>Loppu (s)</label><input type="number" id="exportEnd" min="0" step="0.1" value="0"></div>
            </div>
            <div style="display:flex; justify-content:center; margin: 15px 0;"><button onclick="setFullExportRange()">Koko projekti</button></div>
            <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:auto;"><button onclick="closeExportModal()">Peruuta</button><button onclick="executeExport()" class="primary">Vie (WAV)</button></div>
        </div>
    </div>

    <script>
        const PIXELS_PER_SECOND = 50;
        const CONTROL_WIDTH = 120; 
        const EQ_FREQS = [30, 60, 100, 160, 250, 400, 630, 1000, 1600, 2500, 4000, 6300, 10000, 16000, 20000, 22000];
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // --- GLOBAL STATE ---
        let snapEnabled = false;
        let bpm = 120;

        const masterFX = {
            vol: 1.0,
            delay: { on: false, time: 0.3, feedback: 0.4, mix: 0.3 },
            eq: { on: false, values: new Array(16).fill(0) },
            limiter: { on: false, threshold: -1.0 }
        };

        // Nodes
        let busGain, masterVolNode;
        let delayInput, delayDry, delayWet, delayNode, delayFdbk;
        let eqChain = [], eqOutput;
        let limiterInput, limiterNode;
        let analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;

        function setStatus(msg, isBusy = false) {
            const el = document.getElementById('statusText');
            el.innerText = msg;
            if (isBusy) el.classList.add('busy'); else el.classList.remove('busy');
        }

        function initMasterGraph() {
            busGain = audioCtx.createGain();
            masterVolNode = audioCtx.createGain();
            delayInput = audioCtx.createGain(); delayDry = audioCtx.createGain(); delayWet = audioCtx.createGain(); delayNode = audioCtx.createDelay(2.0); delayFdbk = audioCtx.createGain();
            let eqInput = audioCtx.createGain(); let prev = eqInput;
            EQ_FREQS.forEach(f => {
                const filt = audioCtx.createBiquadFilter(); filt.type = 'peaking'; filt.frequency.value = f; filt.Q.value = 1.5; filt.gain.value = 0;
                prev.connect(filt); prev = filt; eqChain.push(filt);
            });
            eqOutput = prev;
            limiterInput = audioCtx.createGain(); limiterNode = audioCtx.createDynamicsCompressor();
            limiterNode.knee.value = 0; limiterNode.ratio.value = 20; limiterNode.attack.value = 0.003; limiterNode.release.value = 0.25;

            busGain.connect(masterVolNode); masterVolNode.connect(delayInput);
            delayInput.connect(delayDry); delayInput.connect(delayNode); delayNode.connect(delayFdbk); delayFdbk.connect(delayNode); delayNode.connect(delayWet);
            delayDry.connect(eqInput); delayWet.connect(eqInput);
            eqOutput.connect(limiterInput); limiterInput.connect(limiterNode); limiterNode.connect(analyser); analyser.connect(audioCtx.destination);
            updateMasterFXState();
        }
        initMasterGraph();

        function updateMasterFXState() {
            const t = audioCtx.currentTime;
            masterVolNode.gain.setTargetAtTime(masterFX.vol, t, 0.05);
            if (masterFX.delay.on) {
                delayNode.delayTime.setTargetAtTime(masterFX.delay.time, t, 0.05);
                delayFdbk.gain.setTargetAtTime(masterFX.delay.feedback, t, 0.05);
                delayDry.gain.setTargetAtTime(1 - masterFX.delay.mix, t, 0.05);
                delayWet.gain.setTargetAtTime(masterFX.delay.mix, t, 0.05);
            } else {
                delayDry.gain.setTargetAtTime(1, t, 0.05); delayWet.gain.setTargetAtTime(0, t, 0.05); delayFdbk.gain.setTargetAtTime(0, t, 0.05);
            }
            eqChain.forEach((node, i) => { node.gain.setTargetAtTime(masterFX.eq.on ? masterFX.eq.values[i] : 0, t, 0.05); });
            if (masterFX.limiter.on) {
                limiterNode.threshold.setTargetAtTime(masterFX.limiter.threshold, t, 0.05);
                limiterNode.ratio.setTargetAtTime(20, t, 0.05);
            } else { limiterNode.ratio.setTargetAtTime(1, t, 0.05); }
        }

        let tracks = [];
        let isPlaying = false;
        let currentPlayTime = 0; 
        let playStartTime = 0; 
        let playStartOffset = 0; 
        let animationId;
        let currentEditingTrackId = null;
        
        const timelineContainer = document.getElementById('timeline-container');
        const rulerCanvas = document.getElementById('rulerCanvas');
        const playheadContainer = document.getElementById('playhead-container');
        const timeDisplay = document.getElementById('timeDisplay');

        // --- SNAP & GRID LOGIC ---
        function toggleSnap() {
            snapEnabled = !snapEnabled;
            const btn = document.getElementById('snapBtn');
            btn.innerText = snapEnabled ? "Snap: ON" : "Snap: OFF";
            btn.classList.toggle('active', snapEnabled);
            updateGrid();
        }

        function updateGrid() {
            bpm = parseInt(document.getElementById('bpmInput').value) || 120;
            const tracksArea = document.getElementById('tracks-area');
            
            if (!snapEnabled) {
                tracksArea.style.backgroundImage = 'none';
                return;
            }

            // 1 Beat duration in seconds
            const beatDur = 60 / bpm;
            // Beat width in pixels
            const beatPx = beatDur * PIXELS_PER_SECOND;

            // Create CSS gradient grid
            // The gradient makes a 1px line at the start of every repeat
            tracksArea.style.backgroundImage = `linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px)`;
            tracksArea.style.backgroundSize = `${beatPx}px 100%`;
            
            // Offset grid by CONTROL_WIDTH so it aligns with timeline 0
            tracksArea.style.backgroundPosition = `${CONTROL_WIDTH}px 0`;
        }

        function getProjectDuration() {
            let maxEnd = 0; tracks.forEach(t => { const end = t.startTimeOffset + (t.trimEnd - t.trimStart); if(end > maxEnd) maxEnd = end; }); return maxEnd;
        }
        function updateTimelineDimensions() {
            const maxEnd = getProjectDuration();
            const totalSeconds = Math.max(maxEnd + 10, 60);
            const totalWidth = (totalSeconds * PIXELS_PER_SECOND) + CONTROL_WIDTH;
            document.getElementById('tracks-area').style.width = totalWidth + 'px';
            rulerCanvas.width = totalWidth;
            drawRuler(rulerCanvas, totalSeconds);
        }
        function drawRuler(canvas, seconds) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0, canvas.width, canvas.height); ctx.fillStyle = '#222'; ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.font = '10px sans-serif'; ctx.fillStyle = '#888'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
            for(let s = 0; s <= seconds; s++) {
                const x = CONTROL_WIDTH + (s * PIXELS_PER_SECOND);
                ctx.beginPath(); ctx.moveTo(x, 12); ctx.lineTo(x, 24); ctx.stroke(); ctx.fillText(s + 's', x + 3, 22);
                const halfX = x + (PIXELS_PER_SECOND / 2);
                if (s < seconds) { ctx.beginPath(); ctx.moveTo(halfX, 18); ctx.lineTo(halfX, 24); ctx.stroke(); }
            }
        }
        function refreshTimeline() { updateTimelineDimensions(); }

        function addDragListener(e,o){const{onStart:n,onMove:t,onEnd:a,stopProp:l=!0}=o;let c=0,i=!1;const r=(e,o)=>{l&&e.stopPropagation(),i=!0,c=o,n&&n(o,e)},s=(e,o)=>{i&&(e.cancelable&&e.preventDefault(),t&&t(o,o-c,e))},d=e=>{i&&(i=!1,a&&a(e))};e.addEventListener("mousedown",e=>r(e,e.clientX)),window.addEventListener("mousemove",e=>s(e,e.clientX)),window.addEventListener("mouseup",d),e.addEventListener("touchstart",e=>r(e,e.touches[0].clientX),{passive:!1}),window.addEventListener("touchmove",e=>s(e,e.touches[0].clientX),{passive:!1}),window.addEventListener("touchend",d)}

        async function scanWavHeader(file) {
            if (file.name.toLowerCase().endsWith('.mp3')) { return { rate: "Compressed", depth: "Compressed" }; }

                const headerSize = Math.min(file.size, 4096);

                if (view.getUint32(0, false) !== 0x52494646) return { rate: "Unknown", depth: "Unknown" };

        async function renderAndDownload(exportStart, exportEnd) {
            stop();
            const dur = exportEnd - exportStart;
            if (dur <= 0) return alert("Virheellinen pituus");
            const offCtx = new OfflineAudioContext(2, dur * 44100, 44100);
            const offBus = offCtx.createGain();
            const offVol = offCtx.createGain(); offVol.gain.value = masterFX.vol;
            const offDelayIn = offCtx.createGain(); const offDelayDry = offCtx.createGain(); const offDelayWet = offCtx.createGain(); const offDelay = offCtx.createDelay(2.0); const offDelayFdbk = offCtx.createGain();
            if (masterFX.delay.on) { offDelay.delayTime.value = masterFX.delay.time; offDelayFdbk.gain.value = masterFX.delay.feedback; offDelayDry.gain.value = 1 - masterFX.delay.mix; offDelayWet.gain.value = masterFX.delay.mix; } 
            else { offDelayDry.gain.value = 1; offDelayWet.gain.value = 0; }
            offBus.connect(offVol); offVol.connect(offDelayIn); offDelayIn.connect(offDelayDry); offDelayIn.connect(offDelay); offDelay.connect(offDelayFdbk); offDelayFdbk.connect(offDelay); offDelay.connect(offDelayWet);
            const offEqIn = offCtx.createGain(); offDelayDry.connect(offEqIn); offDelayWet.connect(offEqIn);
            let prev = offEqIn; EQ_FREQS.forEach((f, i) => { const filt = offCtx.createBiquadFilter(); filt.type = 'peaking'; filt.frequency.value = f; filt.Q.value = 1.5; filt.gain.value = masterFX.eq.on ? masterFX.eq.values[i] : 0; prev.connect(filt); prev = filt; });
            const offLimiter = offCtx.createDynamicsCompressor(); offLimiter.knee.value = 0; offLimiter.attack.value = 0.003; offLimiter.release.value = 0.25;
            if (masterFX.limiter.on) { offLimiter.threshold.value = masterFX.limiter.threshold; offLimiter.ratio.value = 20; } else { offLimiter.ratio.value = 1; }
            prev.connect(offLimiter); offLimiter.connect(offCtx.destination);

            tracks.forEach(track => {
                const audibleStart = track.startTimeOffset + track.trimStart; const audibleEnd = track.startTimeOffset + track.trimEnd;
                const relativeStart = audibleStart - exportStart;
                
                if (relativeStart >= 0 && relativeStart < dur) {
                    const playDur = Math.min(audibleEnd - audibleStart, dur - relativeStart);
                    const src = track.connectNodes(offCtx, offBus, relativeStart, track.trimStart);
                    src.start(relativeStart, track.trimStart, playDur);
                } else if (relativeStart < 0 && (audibleEnd - exportStart) > 0) {
                    const offsetShift = Math.abs(relativeStart);
                    const playDur = Math.min((audibleEnd - exportStart), dur);
                    const fileOffset = track.trimStart + offsetShift;
                    const src = track.connectNodes(offCtx, offBus, 0, fileOffset);
                    src.start(0, fileOffset, playDur);
                }
            });
