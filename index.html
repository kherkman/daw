<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web Audio DAW - Ultimate Edition</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --track-bg: #2d2d2d;
            --accent: #4caf50;
            --text: #e0e0e0;
            --wave-color: #00bcd4;
            --ruler-height: 24px;
            --control-width: 170px; 
            --mute-color: #d32f2f;
            --off-color: #555;
            --status-color: #ffeb3b;
            --track-height: 110px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 5px;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        /* Toolbar */
        .toolbar {
            position: sticky; top: 0; background: #333; padding: 8px; z-index: 200;
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
            border-bottom: 2px solid #444; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button, .file-upload-label, .input-label {
            background: #444; border: 1px solid #666; color: white; padding: 6px 10px;
            cursor: pointer; border-radius: 4px; font-size: 0.8rem; flex-shrink: 0; user-select: none;
            display: flex; align-items: center; justify-content: center; gap: 5px; height: 32px; box-sizing: border-box;
        }
        select.input-label { cursor: pointer; max-width: 130px; text-overflow: ellipsis; padding:0 5px;}
        button:hover { background: #555; }
        button:active { background: #666; } 
        button.primary { background: var(--accent); border-color: var(--accent); }
        button.active { background: var(--accent); border-color: #45a049; }
        
        /* Batch Tools Area */
        .batch-tools {
            display: flex; align-items: center; gap: 4px; background: #222; 
            padding: 4px 8px; border-radius: 6px; border: 1px solid #555;
        }
        .batch-label { font-size: 0.65rem; color: #aaa; margin-right: 5px; text-transform: uppercase; letter-spacing: 1px; min-width: 80px; }

        .toolbar-divider { width: 1px; height: 30px; background-color: #666; margin: 0 5px; }

        .rec-active { background-color: #d32f2f !important; border-color: #b71c1c !important; color: white !important; animation: pulse-rec 1s infinite; }
        @keyframes pulse-rec { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        input[type="file"] { display: none; }
        
        .bpm-input {
            background: #222; border: 1px solid #555; color: var(--accent); 
            width: 45px; padding: 4px; border-radius: 3px; font-weight: bold; text-align: center;
        }
        .zoom-input { color: #fff; width: 45px; }

        #statusText {
            font-size: 0.8rem; font-weight: bold; color: #aaa; margin: 0 5px;
            min-width: 70px; text-align: center;
        }
        #statusText.busy { color: var(--status-color); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .time-display-container {
            background: #000; border: 1px solid #555; padding: 0 10px; height: 32px;
            border-radius: 4px; font-family: 'Courier New', monospace; font-size: 1.1rem; color: #4caf50;
            font-weight: bold; display:flex; align-items:center; justify-content:center; min-width: 90px;
        }
        
        .meter-container { display: flex; flex-direction: column; gap: 2px; align-items: center; background: #222; padding: 3px; border-radius: 4px; border: 1px solid #444; width: 100%; box-sizing: border-box;}
        .vu-meter { width: 100%; height: 10px; background: #111; display: block; border-radius: 2px; }
        .meter-label { font-size: 0.6rem; color: #aaa; line-height: 1; margin-bottom: -2px; }

        /* Timeline */
        #timeline-container {
            margin-top: 5px; position: relative; width: 100%; height: 75vh; overflow: auto;
            background: #111; border: 1px solid #444; -webkit-overflow-scrolling: touch;
        }
        #rulerCanvas { display: block; background: #222; border-bottom: 1px solid #555; position: sticky; top: 0; z-index: 100; cursor: pointer; }
        #playhead-container { position: absolute; top: 0; bottom: 0; left: 0; width: 0; z-index: 150; pointer-events: none; }
        #playhead { position: absolute; top: 0; bottom: 0; left: 0; width: 2px; background: #ff3333; box-shadow: 0 0 4px rgba(255,0,0,0.5); }
        #playhead::after { content: ''; position: absolute; top: 0; left: -6px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 10px solid #ff3333; }

        /* Tracks & Groups */
        #tracks-area { position: relative; min-width: 100%; padding-top: 5px; background-color: var(--track-bg); }
        
        .group-container { border: 1px solid #111; margin-bottom: 5px; background: #252525; }
        .group-header { background: #1a1a1a !important; border-bottom: 2px solid #000; }
        .group-tracks-area { padding-left: 20px; border-left: 2px solid var(--accent); background: #2a2a2a; }

        .track { height: var(--track-height); border-bottom: 1px solid #000; position: relative; display: flex; align-items: center; background: transparent; transition: opacity 0.2s; }
        .track-controls {
            width: var(--control-width); height: 100%; background: #3a3a3a; padding: 5px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 4px;
            z-index: 90; position: sticky; left: 0; border-right: 2px solid #111; flex-shrink: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.5); justify-content: flex-start;
        }
        
        .track-name-input { 
            width: 100%; background: #111; border: 1px solid #555; color: white; 
            padding: 4px; border-radius: 3px; font-size: 0.75rem; font-weight: bold; box-sizing: border-box;
            text-align: center;
        }
        .group-name-input { color: var(--accent); border-color: var(--accent); }
        
        .control-row { display: flex; gap: 4px; align-items: center; margin-top: auto; width: 100%; }
        .track-select-cb { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; margin: 0; }
        
        .track-btn { font-size: 0.7rem; padding: 4px; cursor: pointer; flex: 1; height: 26px; }
        .mute-btn.active { background-color: var(--mute-color) !important; border-color: #b71c1c; }

        /* Muted styles */
        .track.muted { opacity: 0.7; }
        .track.muted .audio-clip { background: rgba(80, 80, 80, 0.2) !important; border-color: #666 !important; }
        .track.muted .audio-clip canvas { filter: grayscale(100%) opacity(0.4); }

        .waveform-lane { position: relative; flex-grow: 1; height: 100%; overflow: hidden; }
        .audio-clip {
            position: absolute; height: calc(var(--track-height) - 20px); top: 10px; background: rgba(0, 188, 212, 0.15);
            border: 1px solid var(--wave-color); border-radius: 4px; cursor: grab; overflow: hidden; touch-action: none;
        }
        .audio-clip:active { cursor: grabbing; background: rgba(0, 188, 212, 0.25); }
        .audio-clip canvas { height: 100%; width: 100%; display: block; pointer-events: none; }
        
        .trim-handle { position: absolute; top: 0; bottom: 0; width: 24px; cursor: col-resize; z-index: 10; touch-action: none; }
        .trim-handle::before { content: ''; position: absolute; top: 0; bottom: 0; width: 4px; background: rgba(255,255,255,0.4); }
        .trim-start { left: -10px; } .trim-start::before { left: 10px; }
        .trim-end { right: -10px; } .trim-end::before { right: 10px; }
        
        .trim-mask-left, .trim-mask-right { position: absolute; top: 0; bottom: 0; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 5; }
        .trim-mask-left { left: 0; } .trim-mask-right { right: 0; }

        .fade-in-overlay { position: absolute; top: 0; bottom: 0; left: 0; width: 0; background: linear-gradient(to right, rgba(30,30,30,0.85), transparent); pointer-events: none; z-index: 6; }
        .fade-out-overlay { position: absolute; top: 0; bottom: 0; right: 0; width: 0; background: linear-gradient(to left, rgba(30,30,30,0.85), transparent); pointer-events: none; z-index: 6; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-wrapper { background: #333; padding: 10px; border-radius: 8px; width: 95%; max-width: 800px; height: 85vh; display: flex; gap: 10px; position: relative; }
        .modal-small { max-width: 400px; height: auto; padding: 20px; flex-direction: column; }
        .modal-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
        .modal-scroll-track { width: 35px; background: #222; border-radius: 4px; display: flex; justify-content: center; padding: 5px 0; flex-shrink: 0; }
        #modalScrollSlider, #fxScrollSlider { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 100%; height: 100%; cursor: ns-resize; }

        .settings-row { display: flex; gap: 10px; background: #222; padding: 10px; border-radius: 5px; align-items: center; flex-wrap: wrap; flex-shrink: 0; border: 1px solid #333; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 65px; }
        .control-group label { font-size: 0.7rem; color: #aaa; text-align:center; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        .control-group input[type="number"] { background: #444; border: 1px solid #666; color: white; padding: 4px; border-radius: 3px; width: 60px; text-align: center; }

        .fx-header { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; border-bottom:1px solid #444; padding-bottom:5px; }
        .fx-title { color: #fff; font-weight:bold; font-size:0.85rem; }
        .fx-toggle { background: var(--off-color); font-size: 0.65rem; border-radius: 10px; padding: 2px 8px; border:none; cursor: pointer; color:white; }
        .fx-toggle.on { background: var(--accent); }

        .eq-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; height: 150px; min-height: 150px; align-items: end; overflow-x: auto; margin-top: 5px; flex-shrink: 0; }
        .eq-band { display: flex; flex-direction: column; align-items: center; height: 100%; min-width: 20px; }
        .eq-band input[type=range] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 100%; height: 110px; margin-bottom: 5px; }
        .eq-freq { font-size: 0.5rem; color: #aaa; writing-mode: vertical-rl; transform: rotate(180deg); }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="undo()" id="btnUndo">Undo</button>
        <button onclick="redo()" id="btnRedo">Redo</button>
        <div class="toolbar-divider"></div>

        <label class="file-upload-label">+ Raita<input type="file" id="fileInput" multiple accept="audio/*"></label>
        <button onclick="createGroup()" class="primary">+ Ryhmä</button>
        
        <div class="toolbar-divider"></div>

        <!-- Batch Operations Area -->
        <div class="batch-tools">
            <span class="batch-label" id="selectionCountLabel">Valitut: 0 kpl</span>
            <button onclick="toggleSelectAll()">Kaikki / Ei mitään</button>
            <select id="batchGroupSelect" class="input-label" onchange="batchAssignGroup(this.value); this.value='';">
                <option value="">-- Siirrä ryhmään --</option>
                <option value="ROOT">Poista ryhmästä (Juuri)</option>
            </select>
            <button onclick="batchMoveUp()">↑ Ylös</button>
            <button onclick="batchMoveDown()">↓ Alas</button>
            <button onclick="batchMuteToggle()">Mute / Unmute</button>
            <button onclick="batchDelete()" style="background:#b71c1c; border-color:#d32f2f;" title="Voit painaa myös Delete">Poista</button>
        </div>

        <div class="toolbar-divider"></div>

        <button onclick="togglePlay()" id="playBtn">Toista (Space)</button>
        <button onclick="stop(false)">Stop</button>
        <button onclick="toBeginning()">|&lt; (W)</button>
        <div class="time-display-container" id="timeDisplay">00:00:00</div>
        <button id="recBtn" onclick="toggleRecord()">Rec (R)</button>
        
        <div class="toolbar-divider"></div>

        <label class="input-label">BPM: <input type="number" id="bpmInput" class="bpm-input" value="120" min="30" max="300" onchange="updateGrid()"></label>
        <button id="snapBtn" onclick="toggleSnap()">Snap: OFF</button>
        <button id="metroBtn" onclick="toggleMetronome()">Metro (M)</button>

        <label class="input-label">X: <input type="number" id="zoomXInput" class="bpm-input zoom-input" value="50" min="10" max="300" onchange="changeZoomX(this.value)"></label>
        <label class="input-label">Y: <input type="number" id="zoomYInput" class="bpm-input zoom-input" value="110" min="50" max="300" onchange="changeZoomY(this.value)"></label>

        <div class="toolbar-divider"></div>

        <button onclick="openMasterFX()">Master FX</button>
        <button onclick="openExportModal()" class="primary">Export WAV</button>
        <button onclick="saveProject()">Save</button>
        <label class="file-upload-label">Load<input type="file" id="loadInput" multiple accept=".json, audio/*"></label>
        
        <div class="meter-container" style="width:100px; margin-left:auto;">
            <span class="meter-label">Master L/R</span>
            <canvas id="masterMeterL" class="vu-meter" style="height:6px;"></canvas>
            <canvas id="masterMeterR" class="vu-meter" style="height:6px; margin-top:1px;"></canvas>
        </div>
    </div>

    <div id="timeline-container">
        <canvas id="rulerCanvas" height="24"></canvas>
        <div id="playhead-container"><div id="playhead"></div></div>
        <div id="tracks-area" style="min-width: 2000px;"></div>
    </div>

    <!-- Modals -->
    <div id="eqModal" class="modal">
        <div class="modal-wrapper">
            <div class="modal-content" id="trackFxContent"></div>
            <div class="modal-scroll-track"><input type="range" id="modalScrollSlider" min="0" max="100" value="0" step="1"></div>
        </div>
    </div>
    <div id="fxModal" class="modal">
        <div class="modal-wrapper">
            <div class="modal-content" id="masterFxContent"></div>
            <div class="modal-scroll-track"><input type="range" id="fxScrollSlider" min="0" max="100" value="0" step="1"></div>
        </div>
    </div>
    <div id="exportModal" class="modal">
        <div class="modal-wrapper modal-small">
            <h3 style="margin:0 0 20px 0; color:white;">Vie projekti (Export)</h3>
            <div class="settings-row">
                <div class="control-group"><label>Alku (s)</label><input type="number" id="exportStart" min="0" step="0.1" value="0"></div>
                <div class="control-group"><label>Loppu (s)</label><input type="number" id="exportEnd" min="0" step="0.1" value="0"></div>
            </div>
            <div style="display:flex; justify-content:center; margin: 15px 0;"><button onclick="setFullExportRange()">Koko projekti</button></div>
            <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:auto;"><button onclick="closeExportModal()">Peruuta</button><button onclick="executeExport()" class="primary">Vie (WAV)</button></div>
        </div>
    </div>

    <!-- Hidden elements -->
    <div style="display:none;">
        <select id="micSelect"><option value="">Oletusmikrofoni</option></select>
        <canvas id="micMeter" class="vu-meter"></canvas>
        <span id="statusText">Valmis</span>
    </div>

    <script>
        let PIXELS_PER_SECOND = 50;
        const CONTROL_WIDTH = 170; 
        const EQ_FREQS = [30, 60, 100, 160, 250, 400, 630, 1000, 1600, 2500, 4000, 6300, 10000, 16000, 20000, 22000];
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        let snapEnabled = false;
        let metronomeEnabled = false;
        let isRecording = false;
        let bpm = 120;
        let nextMetroTime = 0; let currentBeat = 0;
        let mediaRecorder = null; let recordedChunks = []; let recordStartTime = 0;
        
        // Master memory pools for Undo/Redo without reloading buffers
        const masterTrackPool = new Map();
        const masterGroupPool = new Map();

        // Active timeline arrays
        let tracks = []; 
        let groups = [];
        
        // State Machine (Undo/Redo)
        let undoStack = [];
        let redoStack = [];
        let isRestoringState = false;

        let isPlaying = false; let currentPlayTime = 0; let playStartTime = 0; let playStartOffset = 0; let animationId;
        
        const timelineContainer = document.getElementById('timeline-container');
        const rulerCanvas = document.getElementById('rulerCanvas');
        const playheadContainer = document.getElementById('playhead-container');
        const timeDisplay = document.getElementById('timeDisplay');
        const masterArea = document.getElementById('tracks-area');

        const masterAnalyser = audioCtx.createAnalyser(); masterAnalyser.fftSize = 1024;
        const micAnalyser = audioCtx.createAnalyser(); micAnalyser.fftSize = 1024;
        let micStreamSource = null;

        const createDefaultFX = () => ({
            vol: 1.0, pan: 0.0,
            lpf: { on: false, freq: 20000, q: 1 },
            hpf: { on: false, freq: 20, q: 1 },
            eq: { on: false, values: new Array(16).fill(0) },
            chorus: { on: false, mix: 0.5, rate: 1.5, depth: 0.002 },
            flanger: { on: false, mix: 0.5, rate: 0.5, depth: 0.005, feedback: 0.5 },
            delay: { on: false, time: 0.3, feedback: 0.4, mix: 0.3 },
            reverb: { on: false, mix: 0.3, decay: 2.0 },
            limiter: { on: false, threshold: -1.0 }
        });

        let masterFX = createDefaultFX();
        let busGain;

        function updateSelectionCount() {
            const count = tracks.filter(t => t.isSelected).length + groups.filter(g => g.isSelected).length;
            const label = document.getElementById('selectionCountLabel');
            if(label) label.innerText = `Valitut: ${count} kpl`;
        }

        function generateImpulseResponse(ctx, decay) {
            const length = ctx.sampleRate * decay; const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
            const left = impulse.getChannelData(0); const right = impulse.getChannelData(1);
            for (let i = 0; i < length; i++) { const n = length - i; left[i] = (Math.random() * 2 - 1) * Math.pow(n / length, 5); right[i] = (Math.random() * 2 - 1) * Math.pow(n / length, 5); }
            return impulse;
        }

        function buildFXChain(ctx, inputNode, outputNode, fxState, liveAnalysers = null) {
            let current = inputNode;

            const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = fxState.lpf.freq; lpf.Q.value = fxState.lpf.q;
            if (fxState.lpf.on) { current.connect(lpf); current = lpf; }

            const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = fxState.hpf.freq; hpf.Q.value = fxState.hpf.q;
            if (fxState.hpf.on) { current.connect(hpf); current = hpf; }

            const revIn = ctx.createGain(); const revDry = ctx.createGain(); const revWet = ctx.createGain();
            const convolver = ctx.createConvolver(); convolver.buffer = generateImpulseResponse(ctx, fxState.reverb.decay);
            current.connect(revIn); revIn.connect(revDry); revIn.connect(convolver); convolver.connect(revWet);
            const revOut = ctx.createGain(); revDry.connect(revOut); revWet.connect(revOut);
            if (fxState.reverb.on) { revDry.gain.value = 1 - fxState.reverb.mix; revWet.gain.value = fxState.reverb.mix; } else { revDry.gain.value = 1; revWet.gain.value = 0; }
            current = revOut;

            const chIn = ctx.createGain(); const chDry = ctx.createGain(); const chWet = ctx.createGain();
            const chDelay = ctx.createDelay(); chDelay.delayTime.value = 0.03;
            const chLfo = ctx.createOscillator(); chLfo.frequency.value = fxState.chorus.rate;
            const chDepth = ctx.createGain(); chDepth.gain.value = fxState.chorus.depth;
            chLfo.connect(chDepth); chDepth.connect(chDelay.delayTime); chLfo.start(0);
            current.connect(chIn); chIn.connect(chDry); chIn.connect(chDelay); chDelay.connect(chWet);
            const chOut = ctx.createGain(); chDry.connect(chOut); chWet.connect(chOut);
            if (fxState.chorus.on) { chDry.gain.value = 1 - fxState.chorus.mix; chWet.gain.value = fxState.chorus.mix; } else { chDry.gain.value = 1; chWet.gain.value = 0; }
            current = chOut;

            const flIn = ctx.createGain(); const flDry = ctx.createGain(); const flWet = ctx.createGain();
            const flDelay = ctx.createDelay(); flDelay.delayTime.value = 0.005;
            const flFdbk = ctx.createGain(); flFdbk.gain.value = fxState.flanger.feedback;
            const flLfo = ctx.createOscillator(); flLfo.frequency.value = fxState.flanger.rate;
            const flDepth = ctx.createGain(); flDepth.gain.value = fxState.flanger.depth;
            flLfo.connect(flDepth); flDepth.connect(flDelay.delayTime); flLfo.start(0);
            current.connect(flIn); flIn.connect(flDry); flIn.connect(flDelay); flDelay.connect(flWet); flDelay.connect(flFdbk); flFdbk.connect(flDelay);
            const flOut = ctx.createGain(); flDry.connect(flOut); flWet.connect(flOut);
            if (fxState.flanger.on) { flDry.gain.value = 1 - fxState.flanger.mix; flWet.gain.value = fxState.flanger.mix; } else { flDry.gain.value = 1; flWet.gain.value = 0; }
            current = flOut;

            const delIn = ctx.createGain(); const delDry = ctx.createGain(); const delWet = ctx.createGain();
            const delNode = ctx.createDelay(3.0); delNode.delayTime.value = fxState.delay.time;
            const delFdbk = ctx.createGain(); delFdbk.gain.value = fxState.delay.feedback;
            current.connect(delIn); delIn.connect(delDry); delIn.connect(delNode); delNode.connect(delFdbk); delFdbk.connect(delNode); delNode.connect(delWet);
            const delOut = ctx.createGain(); delDry.connect(delOut); delWet.connect(delOut);
            if (fxState.delay.on) { delDry.gain.value = 1 - fxState.delay.mix; delWet.gain.value = fxState.delay.mix; } else { delDry.gain.value = 1; delWet.gain.value = 0; }
            current = delOut;

            let eqPrev = current;
            EQ_FREQS.forEach((f, i) => { const filt = ctx.createBiquadFilter(); filt.type = 'peaking'; filt.frequency.value = f; filt.Q.value = 1.5; filt.gain.value = fxState.eq.on ? fxState.eq.values[i] : 0; eqPrev.connect(filt); eqPrev = filt; });
            current = eqPrev;

            const limiter = ctx.createDynamicsCompressor(); limiter.knee.value = 0; limiter.attack.value = 0.003; limiter.release.value = 0.25;
            if (fxState.limiter.on) { limiter.threshold.value = fxState.limiter.threshold; limiter.ratio.value = 20; } else { limiter.ratio.value = 1; }
            current.connect(limiter); current = limiter;

            const panner = ctx.createStereoPanner(); panner.pan.value = fxState.pan;
            const outGain = ctx.createGain(); outGain.gain.value = fxState.vol;
            current.connect(panner); panner.connect(outGain);

            if (liveAnalysers) { outGain.connect(liveAnalysers.node); liveAnalysers.node.connect(outputNode); } else { outGain.connect(outputNode); }
            return { outGain, panner };
        }

        function rebuildMasterGraph() {
            if (busGain) busGain.disconnect();
            busGain = audioCtx.createGain();
            buildFXChain(audioCtx, busGain, audioCtx.destination, masterFX, {node: masterAnalyser});
        }
        rebuildMasterGraph();

        // --- STATE MACHINE (UNDO/REDO) ---
        function createSnapshot() {
            return {
                bpm, PIXELS_PER_SECOND, masterFX: JSON.parse(JSON.stringify(masterFX)),
                groups: groups.map(g => ({
                    id: g.id, name: g.name, isMuted: g.isMuted, isCollapsed: g.isCollapsed, isSelected: g.isSelected,
                    fx: JSON.parse(JSON.stringify(g.fx))
                })),
                tracks: tracks.map(t => ({
                    id: t.id, name: t.name, groupId: t.groupId, isMuted: t.isMuted, isSelected: t.isSelected,
                    startTimeOffset: t.startTimeOffset, trimStart: t.trimStart, trimEnd: t.trimEnd, 
                    fadeIn: t.fadeIn, fadeOut: t.fadeOut, fx: JSON.parse(JSON.stringify(t.fx))
                }))
            };
        }
        function saveState() {
            if(isRestoringState) return;
            undoStack.push(createSnapshot());
            if(undoStack.length > 50) undoStack.shift(); 
            redoStack = [];
            updateUndoRedoButtons();
        }
        function restoreState(snap) {
            isRestoringState = true;
            stop();
            
            bpm = snap.bpm; document.getElementById('bpmInput').value = bpm; updateGrid();
            PIXELS_PER_SECOND = snap.PIXELS_PER_SECOND; document.getElementById('zoomXInput').value = PIXELS_PER_SECOND;
            masterFX = snap.masterFX; rebuildMasterGraph();

            tracks.forEach(t => { if(t.DOM) t.DOM.remove(); }); tracks = [];
            groups.forEach(g => { if(g.DOM) g.DOM.remove(); }); groups = [];

            snap.groups.forEach(gData => {
                let g = masterGroupPool.get(gData.id);
                if(!g) { g = new TrackGroup(gData.id, gData.name); masterGroupPool.set(g.id, g); }
                
                g.name = gData.name; g.fx = gData.fx; g.isMuted = gData.isMuted; 
                g.isSelected = gData.isSelected; g.isCollapsed = gData.isCollapsed;
                
                masterArea.appendChild(g.DOM);
                g.DOM.querySelector(`#name-input-${g.id}`).value = g.name;
                g.DOM.querySelector(`#cb-${g.id}`).checked = g.isSelected;
                
                groups.push(g);
                g.updateVisuals();
            });

            snap.tracks.forEach(tData => {
                let t = masterTrackPool.get(tData.id);
                if(!t) return;
                
                t.name = tData.name; t.fx = tData.fx; t.isMuted = tData.isMuted; t.isSelected = tData.isSelected;
                t.startTimeOffset = tData.startTimeOffset; t.trimStart = tData.trimStart; t.trimEnd = tData.trimEnd;
                t.fadeIn = tData.fadeIn; t.fadeOut = tData.fadeOut; t.groupId = tData.groupId;
                
                if (t.groupId) {
                    const gDom = document.getElementById(`group-tracks-${t.groupId}`);
                    if(gDom) gDom.appendChild(t.DOM); else masterArea.appendChild(t.DOM);
                } else { masterArea.appendChild(t.DOM); }
                
                t.DOM.querySelector(`#name-input-${t.id}`).value = t.name;
                t.DOM.querySelector(`#cb-${t.id}`).checked = t.isSelected;
                
                tracks.push(t);
                t.updateUIPlacements();
                t.updateVisuals();
            });

            updateBatchGroupSelect();
            syncTracksArrayOrder();
            refreshTimeline();
            updateUndoRedoButtons();
            updateSelectionCount();
            isRestoringState = false;
        }

        function undo() {
            if(undoStack.length === 0) return;
            redoStack.push(createSnapshot());
            const snap = undoStack.pop();
            restoreState(snap);
        }
        function redo() {
            if(redoStack.length === 0) return;
            undoStack.push(createSnapshot());
            const snap = redoStack.pop();
            restoreState(snap);
        }
        function updateUndoRedoButtons() {
            document.getElementById('btnUndo').style.opacity = undoStack.length > 0 ? '1' : '0.5';
            document.getElementById('btnRedo').style.opacity = redoStack.length > 0 ? '1' : '0.5';
        }

        // --- TRACK GROUP CLASS ---
        class TrackGroup {

                this.fx = createDefaultFX();
                this.isMuted = false; this.isCollapsed = false; this.isSelected = false;

                this.tracksArea.style.display = this.isCollapsed ? 'none' : 'block';
                document.getElementById(`collapse-btn-${this.id}`).innerText = this.isCollapsed ? '[+]' : '[-]';
                this.canvas.style.display = this.isCollapsed ? 'block' : 'none';
                this.muteBtn.className = 'track-btn mute-btn ' + (this.isMuted ? 'active' : '');
                if(this.isCollapsed) this.drawCombinedWaveform();
            }
            drawCombinedWaveform() {
                if(!this.isCollapsed) return;
                const dur = Math.max(getProjectDuration(), 10);
                this.canvas.width = Math.min(dur * PIXELS_PER_SECOND, 30000);
                const h = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--track-height')) || 110;
                this.canvas.height = h - 20;
                const ctx = this.canvas.getContext('2d');
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                ctx.globalCompositeOperation = 'lighter';
                const gTracks = tracks.filter(t => t.groupId === this.id && !t.isMuted);
                gTracks.forEach(t => {
                    const startX = t.startTimeOffset * PIXELS_PER_SECOND; const sx = t.trimStart * PIXELS_PER_SECOND; const sw = (t.trimEnd - t.trimStart) * PIXELS_PER_SECOND;
                    if(sw > 0) { try { ctx.drawImage(t.canvas, sx, 0, sw, t.canvas.height, startX, 0, sw, this.canvas.height); } catch(e){} }
                });
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        // --- TRACK CLASS ---
        class Track {
            constructor(id, file, buffer, name) {
                this.id = id; this.file = file; this.buffer = buffer; this.name = name || file.name;
                this.fx = createDefaultFX(); this.fadeIn = 0.0; this.fadeOut = 0.0; 
                this.isMuted = false; this.isSelected = false; this.groupId = null;
                this.startTimeOffset = 0; this.trimStart = 0; this.trimEnd = buffer.duration;

            }
            createUI() {
                this.DOM = document.createElement('div'); this.DOM.className = 'track'; this.DOM.id = `track-${this.id}`;
                const safeName = this.name.replace(/"/g, '&quot;');

                    <div class="track-controls">
                        <input type="text" id="name-input-${this.id}" class="track-name-input" value="${safeName}">

                            <input type="checkbox" id="cb-${this.id}" class="track-select-cb">
                            <button id="mute-${this.id}" class="track-btn mute-btn">Mute</button>
                            <button onclick="openEQ('${this.id}', false)" class="track-btn">FX</button>
                        </div>
                    </div>`;
                    
                const lane = document.createElement('div'); lane.className = 'waveform-lane';
                const clip = document.createElement('div'); clip.className = 'audio-clip'; clip.id = `clip-${this.id}`;
                this.canvas = document.createElement('canvas'); 
                const trimL = document.createElement('div'); trimL.className = 'trim-handle trim-start';
                const trimR = document.createElement('div'); trimR.className = 'trim-handle trim-end';
                const maskL = document.createElement('div'); maskL.className = 'trim-mask-left';
                const maskR = document.createElement('div'); maskR.className = 'trim-mask-right';
                const fadeIn = document.createElement('div'); fadeIn.className = 'fade-in-overlay';
                const fadeOut = document.createElement('div'); fadeOut.className = 'fade-out-overlay';
                
                clip.append(this.canvas, maskL, maskR, fadeIn, fadeOut, trimL, trimR); lane.appendChild(clip); this.DOM.appendChild(lane);
                
                const nameInput = this.DOM.querySelector(`#name-input-${this.id}`);
                nameInput.onchange = (e) => { this.name = e.target.value; saveState(); };
                
                const cb = this.DOM.querySelector(`#cb-${this.id}`);
                cb.onchange = (e) => { this.isSelected = e.target.checked; updateSelectionCount(); };
                
                this.muteBtn = this.DOM.querySelector(`#mute-${this.id}`);
                this.muteBtn.onclick = () => { this.isMuted = !this.isMuted; updateMuteVisuals(); saveState(); };
                
                this.setupDrag(clip); this.setupTrim(trimL, 'start', clip, maskL); this.setupTrim(trimR, 'end', clip, maskR);
                
                this.canvas.width = Math.min(this.buffer.duration * PIXELS_PER_SECOND, 30000);
                this.drawWaveform(this.canvas);
            }
            updateVisuals() {
                this.muteBtn.className = 'track-btn mute-btn ' + (this.isMuted ? 'active' : '');
            }
            updateUIPlacements() {
                const el = this.DOM.querySelector('.audio-clip'); if(!el) return;
                el.style.left = (this.startTimeOffset * PIXELS_PER_SECOND) + 'px';
                el.style.width = (this.buffer.duration * PIXELS_PER_SECOND) + 'px';
                
                const maskL = el.querySelector('.trim-mask-left'); const maskR = el.querySelector('.trim-mask-right');
                const trimL = el.querySelector('.trim-start'); const trimR = el.querySelector('.trim-end');
                const fIn = el.querySelector('.fade-in-overlay'); const fOut = el.querySelector('.fade-out-overlay');
                
                maskL.style.width = (this.trimStart * PIXELS_PER_SECOND) + 'px';
                maskR.style.width = ((this.buffer.duration - this.trimEnd) * PIXELS_PER_SECOND) + 'px';
                trimL.style.left = ((this.trimStart * PIXELS_PER_SECOND) - 10) + 'px';
                trimR.style.right = (((this.buffer.duration - this.trimEnd) * PIXELS_PER_SECOND) - 10) + 'px';
                
                fIn.style.width = (this.fadeIn * PIXELS_PER_SECOND) + 'px'; fIn.style.left = (this.trimStart * PIXELS_PER_SECOND) + 'px';
                fOut.style.width = (this.fadeOut * PIXELS_PER_SECOND) + 'px'; fOut.style.right = ((this.buffer.duration - this.trimEnd) * PIXELS_PER_SECOND) + 'px';
                
                if(this.canvas.width !== Math.min(this.buffer.duration * PIXELS_PER_SECOND, 30000)) {
                    this.canvas.width = Math.min(this.buffer.duration * PIXELS_PER_SECOND, 30000);
                    this.drawWaveform(this.canvas);
                }
            }
            drawWaveform(canvas) {
                const ctx = canvas.getContext('2d'); const data = this.buffer.getChannelData(0); const step = Math.ceil(data.length / canvas.width); const amp = canvas.height / 2;
                ctx.clearRect(0,0, canvas.width, canvas.height); ctx.fillStyle = '#00bcd4'; ctx.beginPath();
                for (let i = 0; i < canvas.width; i++) {
                    let min = 1.0, max = -1.0; for (let j = 0; j < step; j++) { const v = data[(i * step) + j]; if (v < min) min = v; if (v > max) max = v; }
                    ctx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
                }
            }
            setupDrag(el) {
                let initLeft; addDragListener(el, {
                    onStart: () => { initLeft = el.offsetLeft; el.style.cursor = 'grabbing'; },
                    onMove: (x, dx) => { 
                        let l = initLeft + dx; if (snapEnabled) { const beatDur = 60 / bpm; l = Math.round((l / PIXELS_PER_SECOND) / beatDur) * beatDur * PIXELS_PER_SECOND; }
                        this.startTimeOffset = l / PIXELS_PER_SECOND; this.updateUIPlacements(); refreshTimeline(); 
                    }, onEnd: () => { el.style.cursor = 'grab'; saveState(); }
                });
            }
            setupTrim(h, type, clip, mask) {
                addDragListener(h, {
                    onMove: (x, dx) => {
                        const rect = clip.getBoundingClientRect(); const lx = x - rect.left; 
                        let t = lx / PIXELS_PER_SECOND; if (t < 0) t = 0; if (t > this.buffer.duration) t = this.buffer.duration;
                        if (type === 'start') { if (t >= this.trimEnd - 0.1) return; this.trimStart = t; } else { if (t <= this.trimStart + 0.1) return; this.trimEnd = t; }
                        this.updateUIPlacements(); refreshTimeline();
                    }, onEnd: () => { saveState(); }
                });
            }
            play(ctx, dest, startWhen, fileOffset, playDur) {
                const src = ctx.createBufferSource(); src.buffer = this.buffer;
                const isLive = (ctx === audioCtx);
                const nodes = buildFXChain(ctx, src, dest, this.fx, isLive ? {node: this.analyser} : null);
                nodes.outGain.gain.setValueAtTime(this.isMuted ? 0 : this.fx.vol, startWhen);
                if (!this.isMuted) {
                    if (this.fadeIn > 0) { const fiStart = startWhen + (this.trimStart - fileOffset); nodes.outGain.gain.setValueAtTime(0, fiStart); nodes.outGain.gain.linearRampToValueAtTime(this.fx.vol, fiStart + this.fadeIn); }
                    if (this.fadeOut > 0) { const foEnd = startWhen + (this.trimEnd - fileOffset); nodes.outGain.gain.setValueAtTime(this.fx.vol, foEnd - this.fadeOut); nodes.outGain.gain.linearRampToValueAtTime(0, foEnd); }
                }
                if (isLive) { this.liveNodes = nodes; this.source = src; }
                src.start(startWhen, fileOffset, playDur);
            }
        }

        // --- BATCH OPERATIONS & DOM SYNC ---
        function toggleSelectAll() {
            const allSelected = tracks.every(t => t.isSelected) && (groups.length === 0 || groups.every(g => g.isSelected));
            const targetState = !allSelected;
            tracks.forEach(t => { t.isSelected = targetState; t.DOM.querySelector(`#cb-${t.id}`).checked = targetState; });
            groups.forEach(g => { g.isSelected = targetState; g.DOM.querySelector(`#cb-${g.id}`).checked = targetState; });
            updateSelectionCount();
        }
        function batchAssignGroup(groupId) {
            if(!groupId) return;
            const target = groupId === "ROOT" ? null : groupId;
            tracks.filter(t => t.isSelected).forEach(t => {
                t.groupId = target;
                const parent = target ? document.getElementById(`group-tracks-${target}`) : masterArea;
                if(parent) parent.appendChild(t.DOM);
            });
            syncTracksArrayOrder(); updateMuteVisuals(); saveState();
        }
        function batchMuteToggle() {
            const selected = [...tracks.filter(t=>t.isSelected), ...groups.filter(g=>g.isSelected)];
            if(selected.length === 0) return;
            const anyMuted = selected.some(x => x.isMuted);
            selected.forEach(x => { x.isMuted = !anyMuted; x.updateVisuals(); });
            updateMuteVisuals(); saveState();
        }
        function batchDelete() {
            const selectedTracks = tracks.filter(t=>t.isSelected);
            const selectedGroups = groups.filter(g=>g.isSelected);
            if(selectedTracks.length===0 && selectedGroups.length===0) return;
            
            selectedGroups.forEach(g => { 
                tracks.filter(t => t.groupId === g.id && !t.isSelected).forEach(t => { 
                    t.groupId = null; masterArea.appendChild(t.DOM); 
                });
                g.DOM.remove(); 
            });
            
            selectedTracks.forEach(t => { t.DOM.remove(); t.groupId = null; });
            
            syncTracksArrayOrder(); updateBatchGroupSelect(); updateSelectionCount(); saveState();
        }
        function batchMoveUp() {
            let moved = false;
            let items = Array.from(masterArea.children);
            for(let i=0; i<items.length; i++) {
                const el = items[i]; const id = el.id.replace('track-','').replace('group-container-','');
                const obj = masterTrackPool.get(id) || masterGroupPool.get(id);
                if(obj && obj.isSelected) {
                    let prev = el.previousElementSibling;
                    if(prev) {
                        const prevId = prev.id.replace('track-','').replace('group-container-','');
                        const prevObj = masterTrackPool.get(prevId) || masterGroupPool.get(prevId);
                        if(!prevObj || !prevObj.isSelected) { el.parentNode.insertBefore(el, prev); moved = true; }
                    }
                }
            }
            groups.forEach(g => {
                const container = document.getElementById(`group-tracks-${g.id}`);
                let gItems = Array.from(container.children);
                for(let i=0; i<gItems.length; i++) {
                    const el = gItems[i]; const id = el.id.replace('track-',''); const obj = masterTrackPool.get(id);
                    if(obj && obj.isSelected) {
                        let prev = el.previousElementSibling;
                        if(prev) {
                            const prevId = prev.id.replace('track-',''); const prevObj = masterTrackPool.get(prevId);
                            if(!prevObj || !prevObj.isSelected) { el.parentNode.insertBefore(el, prev); moved = true; }
                        }
                    }
                }
            });
            if(moved){ syncTracksArrayOrder(); saveState(); }
        }
        function batchMoveDown() {
            let moved = false;
            let items = Array.from(masterArea.children);
            for(let i=items.length-1; i>=0; i--) {
                const el = items[i]; const id = el.id.replace('track-','').replace('group-container-','');
                const obj = masterTrackPool.get(id) || masterGroupPool.get(id);
                if(obj && obj.isSelected) {
                    let next = el.nextElementSibling;
                    if(next) {
                        const nextId = next.id.replace('track-','').replace('group-container-','');
                        const nextObj = masterTrackPool.get(nextId) || masterGroupPool.get(nextId);
                        if(!nextObj || !nextObj.isSelected) { el.parentNode.insertBefore(next, el); moved = true; }
                    }
                }
            }
            groups.forEach(g => {
                const container = document.getElementById(`group-tracks-${g.id}`);
                let gItems = Array.from(container.children);
                for(let i=gItems.length-1; i>=0; i--) {
                    const el = gItems[i]; const id = el.id.replace('track-',''); const obj = masterTrackPool.get(id);
                    if(obj && obj.isSelected) {
                        let next = el.nextElementSibling;
                        if(next) {
                            const nextId = next.id.replace('track-',''); const nextObj = masterTrackPool.get(nextId);
                            if(!nextObj || !nextObj.isSelected) { el.parentNode.insertBefore(next, el); moved = true; }
                        }
                    }
                }
            });
            if(moved){ syncTracksArrayOrder(); saveState(); }
        }
        function createGroup() {
            const id = 'g_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            const g = new TrackGroup(id, 'Ryhmä ' + (groups.length + 1));
            masterGroupPool.set(g.id, g); groups.push(g); masterArea.appendChild(g.DOM);

        function updateBatchGroupSelect() {
            const sel = document.getElementById('batchGroupSelect');
            sel.innerHTML = '<option value="">-- Siirrä ryhmään --</option><option value="ROOT">Poista ryhmästä (Juuri)</option>';
            groups.forEach(g => { sel.innerHTML += `<option value="${g.id}">${g.name}</option>`; });
        }
        function syncTracksArrayOrder() {
            const newTracks = []; const newGroups = [];
            Array.from(masterArea.children).forEach(child => {
                if (child.classList.contains('track')) {
                    const tid = child.id.replace('track-', ''); newTracks.push(masterTrackPool.get(tid));
                } else if (child.classList.contains('group-container')) {
                    const gid = child.id.replace('group-container-', ''); newGroups.push(masterGroupPool.get(gid));
                    Array.from(child.querySelector('.group-tracks-area').children).forEach(tChild => {
                        if (tChild.id.startsWith('track-')) { const tid = tChild.id.replace('track-', ''); newTracks.push(masterTrackPool.get(tid)); }
                    });
                }
            });
            tracks = newTracks.filter(t => t); groups = newGroups.filter(g => g);
        }
        function updateMuteVisuals() {
            tracks.forEach(t => {
                let effectivelyMuted = t.isMuted;
                if (t.groupId) { const g = groups.find(x => x.id === t.groupId); if (g && g.isMuted) effectivelyMuted = true; }
                if (effectivelyMuted) t.DOM.classList.add('muted'); else t.DOM.classList.remove('muted');
                t.updateVisuals();
            });
            groups.forEach(g => {
                if (g.isMuted) g.header.classList.add('muted'); else g.header.classList.remove('muted');
                g.updateVisuals();
            });
        }

        // --- ZOOM MANAGEMENT ---
        function changeZoomX(val) { PIXELS_PER_SECOND = parseInt(val); refreshTimeline(); tracks.forEach(t => t.updateUIPlacements()); groups.forEach(g => g.drawCombinedWaveform()); }
        function changeZoomY(val) { document.documentElement.style.setProperty('--track-height', parseInt(val) + 'px'); }

        // --- DRAW METER LOGIC ---
        function drawMeter(analyser, canvasId) {
            const canvas = document.getElementById(canvasId); if (!canvas) return;
            const ctx = canvas.getContext('2d'); const w = canvas.width; const h = canvas.height;
            if (!analyser) { ctx.clearRect(0,0,w,h); return; }
            const data = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(data);
            let sum = 0; for (let i = 0; i < data.length; i++) sum += data[i]*data[i];
            const rms = Math.sqrt(sum / data.length); let db = 20 * Math.log10(rms); if (!isFinite(db)) db = -100;
            let pct = (db + 60) / 60; if(pct<0)pct=0; if(pct>1)pct=1;
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
            const grad = ctx.createLinearGradient(0,0,w,0); grad.addColorStop(0, '#00ff00'); grad.addColorStop(0.75, '#ffff00'); grad.addColorStop(0.95, '#ff0000');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w*pct,h);
        }

        // --- KEYBOARD SHORTCUTS ---
        window.addEventListener('keydown', (e) => {
            const tag = e.target.tagName; if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
            switch (e.code) {
                case 'Space': e.preventDefault(); togglePlay(); break;
                case 'KeyW': e.preventDefault(); toBeginning(); break;
                case 'KeyA': e.preventDefault(); seek(-5); break;
                case 'KeyD': e.preventDefault(); seek(5); break;
                case 'KeyR': e.preventDefault(); toggleRecord(); break;
                case 'KeyM': e.preventDefault(); toggleMetronome(); break;

                const groupBusses = {}; groups.forEach(g => { const inNode = offCtx.createGain(); const nodes = buildFXChain(offCtx, inNode, bus, g.fx, null); nodes.outGain.gain.value = g.isMuted ? 0 : g.fx.vol; groupBusses[g.id] = inNode; });

                tracks.forEach(t => {
                    const aStart = t.startTimeOffset + t.trimStart; const aEnd = t.startTimeOffset + t.trimEnd; const rStart = aStart - start;
                    const dest = t.groupId && groupBusses[t.groupId] ? groupBusses[t.groupId] : bus;
                    if (rStart >= 0 && rStart < dur) { const pDur = Math.min(aEnd - aStart, dur - rStart); t.play(offCtx, dest, rStart, t.trimStart, pDur); } 
                    else if (rStart < 0 && (aEnd - start) > 0) { const offShift = Math.abs(rStart); const pDur = Math.min((aEnd - start), dur); t.play(offCtx, dest, 0, t.trimStart + offShift, pDur); }
                });
                
                const buf = await offCtx.startRendering(); const wav = bufferToWave(buf, buf.length);
                const a = document.createElement('a'); a.href = URL.createObjectURL(wav); a.download = 'mix.wav'; a.click(); 
            }, 50);
        }

        function bufferToWave(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer), channels = [], i, offset = 0, pos = 0;
            const setU16=d=>{view.setUint16(pos,d,true);pos+=2;}; const setU32=d=>{view.setUint32(pos,d,true);pos+=4;};
            setU32(0x46464952); setU32(length-8); setU32(0x45564157); setU32(0x20746d66); setU32(16); setU16(1); setU16(numOfChan); setU32(abuffer.sampleRate); setU32(abuffer.sampleRate*2*numOfChan); setU16(numOfChan*2); setU16(16); setU32(0x61746164); setU32(length-pos-4);
            for(i=0; i<numOfChan; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) { for(i=0; i<numOfChan; i++) { let s = Math.max(-1, Math.min(1, channels[i][offset] || 0)); s = (s<0?s*32768:s*32767)|0; view.setInt16(pos, s, true); pos+=2; } offset++; }
            return new Blob([buffer], {type: "audio/wav"});
        }

        saveState();
        updateUndoRedoButtons();
        updateSelectionCount();
    </script>
</body>
</html>
